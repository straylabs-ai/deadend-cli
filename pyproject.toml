# This is a workspace root configuration file
# It doesn't define a buildable package, just manages the workspace

[tool.uv.workspace]
members = [
    "deadend_cli/",
    "deadend_cli/cli/",
    "deadend_cli/deadend_sdk/", 
    "deadend_cli/deadend_prompts/",
    "deadend_cli/eval/",
]

# Note: Publishing is configured to only publish the main package
# Individual packages are bundled into the main deadend_cli package


